<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WAWA - New Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="overlay">
        <img src="logo-wawa.png" class="main-logo">
        
        <div class="menu-container">
            <button onclick="showRules()">איך משחקים?</button>
            <button onclick="setMode('cpu')">שחקן נגד מחשב</button>
            <button onclick="setMode('pvp')">שחקן נגד שחקן</button>
        </div>

        <button class="lock-btn" onclick="openAdmin()">🔒</button>
    </div>

    <div id="turn-modal" class="overlay" style="display:none; background: rgba(7,39,85,0.95);">
        <div class="turn-box">
            <h1 id="next-player-name" style="color:#072755">תור של חזי</h1>
            <button onclick="revealHand()" style="background:#072755; color:white;">אני מוכן!</button>
        </div>
    </div>

    <div id="game-board" style="display:none;">
        <div class="opponent-info" id="opp-info"></div>

        <div class="center-area">
            <div class="deck-pile" onclick="drawCard()">
                <img src="cards/card_back.png">
            </div>
            <div id="discard-pile">
                </div>
        </div>

        <div class="player-hand-container">
            <h3 id="current-player-name"></h3>
            <div id="player-hand" class="card-grid"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
