<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAWA - Double Fun!</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="overlay">
        <div class="logo-area">
            <img src="logo-wawa.png" class="wawa-logo-img" alt="WAWA Logo">
            <h1 class="wawa-tagline ltr">Words Activity Double Fun!</h1>
        </div>
        
        <div id="menu-main" class="menu-container">
            <button class="menu-btn" onclick="openInfoModal('rules')">איך משחקים?</button>
            <button class="menu-btn" onclick="setMode('cpu')">שחקן נגד מחשב</button>
            <button class="menu-btn" onclick="setMode('pvp')">שחקן נגד שחקן</button>
        </div>

        <div id="names-input" class="menu-container" style="display:none;">
            <input type="text" id="p1-name" placeholder="שם שחקן 1" class="name-input">
            <input type="text" id="p2-name" placeholder="שם שחקן 2" class="name-input">
            <button class="menu-btn" onclick="startPVP()">התחל משחק</button>
        </div>

        <button class="lock-btn" onclick="openInfoModal('admin')">🔒</button>
    </div>

    <div id="info-modal" class="overlay" style="display:none;">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <p id="modal-text"></p>
            <button class="modal-btn" onclick="closeInfoModal()">הבנתי</button>
        </div>
    </div>

    <div id="turn-modal" class="overlay" style="display:none;">
        <div class="modal-content">
            <h1>תור השחקן</h1>
            <p id="turn-instruction"></p>
            <button class="ready-btn" onclick="revealHand()">אני מוכן!</button>
        </div>
    </div>

    <div id="game-board" style="display:none;">
        <div id="opponent-hand" class="hand-container opponent-fan"></div>

        <div class="game-center">
            <div class="deck-pile horizontal" onclick="drawCard()">
                <img src="card_back.jpg" class="card-back-img horizontal-card">
            </div>
            <div id="discard-pile" class="pile-slot"></div>
        </div>

        <div class="player-area">
            <div id="player-hand" class="hand-container player-fan"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
