<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAWA Online | Word Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-blue: #092854;
            --wawa-gold: #d4af37;
            --wawa-black: #1a1a1a;
            --wawa-white: #ffffff;
        }

        body {
            background-color: var(--main-blue);
            color: var(--wawa-white);
            font-family: 'Comic Neue', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* מסך פתיחה - בסגנון Super Tic Tac Toe */
        #start-screen {
            background-color: #15803d; /* ירוק בסגנון המשחק הקודם שלך */
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .menu-title {
            font-size: 6rem;
            color: var(--wawa-gold);
            margin-bottom: 30px;
            text-shadow: 4px 4px 0px #000;
        }

        .menu-button {
            width: 320px;
            padding: 15px;
            margin: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            border: 4px solid #000;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: 'Comic Neue', sans-serif;
        }

        .btn-black { background-color: var(--wawa-black); color: var(--wawa-gold); }
        .btn-gold { background-color: var(--wawa-gold); color: #000; }
        .btn-white { background-color: #fff; color: #000; }

        .menu-button:hover { transform: scale(1.05); }

        /* לוח המשחק (מוסתר בהתחלה) */
        #game-container {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        #game-board {
            flex-grow: 1;
            margin: 20px;
            border: 3px solid var(--wawa-gold);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
        }

        #player-hand {
            background: rgba(0, 0, 0, 0.4);
            border-top: 3px solid var(--wawa-gold);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            min-height: 180px;
        }

        .card {
            width: 100px;
            height: 140px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: 0.2s;
        }

        .card:hover { transform: translateY(-20px); }

        /* חלונית הוראות */
        #instructions-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: black;
            padding: 30px;
            border-radius: 20px;
            border: 5px solid var(--wawa-gold);
            z-index: 200;
            max-width: 80%;
            text-align: right;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="menu-title">WAWA</h1>
        
        <button class="menu-button btn-black" onclick="showInstructions()">איך משחקים?</button>
        <button class="menu-button btn-gold" onclick="startOnline()">שחקן נגד שחקן (Online)</button>
        <button class="menu-button btn-white" onclick="startAI(1)">שחקן נגד מחשב</button>
        <button class="menu-button btn-white" onclick="startAI(3)">שחקן נגד 3 מחשבים</button>
    </div>

    <div id="game-container">
        <div id="game-board">
            <div id="game-messages">ממתין לתור שלך...</div>
        </div>
        <div id="player-hand"></div>
    </div>

    <div id="instructions-modal">
        <h2>איך משחקים ב-WAWA?</h2>
        <p>1. כל שחקן מקבל 7 קלפים.</p>
        <p>2. עליך להניח קלף שמתאים בצבע או באות הראשונה לקלף שעל השולחן.</p>
        <p>3. קלפי זהב הם קלפי כוח (ערבוב, גניבה, הגנה).</p>
        <button onclick="closeInstructions()">הבנתי!</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function showInstructions() {
            document.getElementById('instructions-modal').style.display = 'block';
        }

        function closeInstructions() {
            document.getElementById('instructions-modal').style.display = 'none';
        }

        function startOnline() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            socket.emit('join-game', { mode: 'online' });
        }

        function startAI(opponentsCount) {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            socket.emit('join-game', { mode: 'ai', count: opponentsCount });
        }

        // האזנה לקבלת קלפים מהשרת
        socket.on('deal-cards', (cards) => {
            const hand = document.getElementById('player-hand');
            hand.innerHTML = ''; // ניקוי יד קודמת
            cards.forEach(card => {
                const img = document.createElement('img');
                img.src = card; // הנתיב מהשרת
                img.className = 'card';
                hand.appendChild(img);
            });
        });
    </script>
</body>
</html>
