<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WAWA Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="overlay">
        <div class="logo-area">
            <img src="logo-wawa.png" class="main-logo-img">
            <h1 class="logo-text">Words Activity Double Fun!</h1>
        </div>
        
        <div class="menu-container">
            <button onclick="showRules()">איך משחקים?</button>
            <button onclick="setMode('cpu')">שחקן נגד מחשב</button>
            <button onclick="setMode('pvp')">שחקן נגד שחקן</button>
        </div>

        <button class="lock-btn" onclick="openAdmin()">🔒</button>
        
        <div id="names-input" style="display:none;"></div>
    </div>

    <div id="game-board" style="display:none;">
        <div class="center-area">
            <div id="discard-pile"></div>
            <div class="deck-pile" onclick="drawCard()">
                <img src="card_back.jpg" class="card-image">
            </div>
        </div>
        <div id="player-hand" class="card-grid"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
