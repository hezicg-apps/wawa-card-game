<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAWA Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-blue: #092854;
            --wawa-gold: #d4af37;
            --pure-white: #ffffff;
            --menu-black: #121212;
        }

        body {
            background-color: var(--bg-blue);
            color: var(--pure-white);
            font-family: 'Comic Neue', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .main-logo {
            width: 320px; /* הגדלתי את הלוגו */
            max-width: 85vw;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* תיקון סלוגן LTR וצביעת WA */
        .slogan {
            direction: ltr;
            display: inline-block;
            font-size: 1.5rem;
            color: var(--pure-white);
            margin-top: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .wa-highlight {
            color: var(--wawa-gold);
            font-weight: bold;
        }

        /* כפתורי תפריט */
        .menu-btn {
            width: 320px;
            max-width: 90vw;
            padding: 16px;
            margin: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 60px;
            border: 4px solid var(--menu-black);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Comic Neue', sans-serif;
            box-sizing: border-box; /* מבטיח שהמסגרת לא תגדיל את הכפתור */
        }

        /* קו מתאר צהוב לאיך משחקים */
        .btn-rules { 
            background-color: var(--menu-black); 
            color: var(--wawa-gold);
            border: 4px solid var(--wawa-gold); 
        }

        .btn-online { background-color: var(--wawa-gold); color: var(--menu-black); }
        .btn-ai { background-color: var(--pure-white); color: var(--menu-black); }

        .menu-btn:hover { transform: translateY(-3px); }

        /* התאמה לניידים */
        @media (max-width: 480px) {
            .menu-btn {
                font-size: 1.2rem; /* הקטנת טקסט כדי שלא יישבר */
                padding: 14px;
            }
            .main-logo {
                width: 260px;
            }
            .slogan {
                font-size: 1.2rem;
            }
        }

        /* מודאלים */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
        }

        .modal-content {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--pure-white);
            color: var(--menu-black);
            padding: 30px;
            border-radius: 30px;
            border: 6px solid var(--wawa-gold);
            z-index: 110;
            width: 550px;
            max-width: 85%;
            text-align: center;
        }

        .modal-content p { text-align: right; font-size: 1.2rem; }

        .action-btn {
            background-color: var(--bg-blue);
            color: var(--wawa-gold);
            padding: 12px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            cursor: pointer;
            font-weight: bold;
        }

        select {
            padding: 10px;
            font-size: 1.2rem;
            margin: 15px 0;
            width: 200px;
            border: 2px solid var(--bg-blue);
            border-radius: 10px;
        }

        #game-container { display: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="modal-overlay"></div>

    <div id="start-screen">
        <div class="logo-container">
            <img src="logo-wawa.png" alt="WAWA Logo" class="main-logo">
            <br>
            <div class="slogan">
                <span class="wa-highlight">Wa</span>rds <span class="wa-highlight">Ac</span>tivity Double Fun!
            </div>
        </div>
        
        <button class="menu-btn btn-rules" onclick="openModal('rules-modal')">איך משחקים?</button>
        <button class="menu-btn btn-online" onclick="startGame('online')">שחקן נגד שחקן (Online)</button>
        <button class="menu-btn btn-ai" onclick="openModal('ai-modal')">שחקן נגד מחשב</button>
    </div>

    <div id="rules-modal" class="modal-content">
        <h2>הוראות המשחק</h2>
        <p>• כל שחקן מקבל 7 קלפים. המטרה: להיות הראשון בלי קלפים!</p>
        <p>• ניתן להניח קלף שמתאים ב<b>צבע</b> או ב<b>אות הראשונה</b> לקלף שעל השולחן.</p>
        <p>• קלפי הכוח המוזהבים יעזרו לכם לשבש את היריבים.</p>
        <button class="action-btn" onclick="closeModals()">הבנתי!</button>
    </div>

    <div id="ai-modal" class="modal-content">
        <h2>משחק נגד המחשב</h2>
        <p style="text-align: center;">כמה שחקני מחשב יצטרפו אליך?</p>
        <select id="ai-player-count">
            <option value="1">שחקן מחשב אחד</option>
            <option value="2">2 שחקני מחשב</option>
            <option value="3">3 שחקני מחשב</option>
        </select>
        <br>
        <button class="action-btn" onclick="startGame('ai')">התחל משחק</button>
    </div>

    <div id="game-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function openModal(id) {
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById(id).style.display = 'block';
        }

        function closeModals() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.querySelectorAll('.modal-content').forEach(m => m.style.display = 'none');
        }

        function startGame(mode) {
            closeModals();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            if (mode === 'ai') {
                const count = document.getElementById('ai-player-count').value;
                socket.emit('join-game', { mode: 'ai', count: count });
            } else {
                socket.emit('join-game', { mode: 'online' });
            }
        }
    </script>
</body>
</html>
